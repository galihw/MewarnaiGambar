			.splitright {

			}
			
			.top {
				position: absolute;

			.expand-btn {
				background-color: #003049;
				border: none;

				font-size: 1rem;
				padding: 1rem;
				text-align: left;
				transition: 0.5s;

				height: 40px;

					var ddd1 = document.createElement('div');
					ddd1.style.color = "#000000";
					ddd1.style.font = "20px arial";
					
					
					var ccc1 = document.createElement('img');
					ccc1.width = wh[0];
					ccc1.height = wh[1];
					
					
					var ccc2 = document.createElement('canvas');
					ccc2.width = wh[0];
					ccc2.height = wh[1]+20;
					var ctxblank = ccc2.getContext("2d");
					ctxblank.fillStyle = '#ffffff';
					ctxblank.fillRect(0, 0, ccc2.width, ccc2.height);
					
					if(ccc1.height==0)	hidingElemen(ccc1);
					if(ccc2.height==0)	hidingElemen(ccc2);
					
					document.body.appendChild(ddd1);
					document.body.appendChild(ccc1);
					document.body.appendChild(ccc2);
					
					ddd1.innerHTML = inner[1];
					ccc1.src = url[1];
					
					if(inner[1]=="")	hidingElemen(ddd1);
				}
